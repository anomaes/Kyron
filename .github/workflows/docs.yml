name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Build documentation
        run: npm run build
        working-directory: docs
        env:
          DOCS_BASE: /Kyron/
          DOCS_HOSTNAME: https://anomaes.github.io/Kyron/

      - name: Configure existing GitHub Pages site
        id: configure-pages
        continue-on-error: true
        uses: actions/configure-pages@v6

      - name: Verify Pages bootstrap token
        if: steps.configure-pages.outcome == 'failure'
        env:
          PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
        run: |
          if [ -z "$PAGES_ENABLEMENT_TOKEN" ]; then
            echo "::error::Pages is not enabled. Add a PAGES_ENABLEMENT_TOKEN repository secret with Pages write permission, then rerun this workflow."
            exit 1
          fi

      - name: Enable and configure GitHub Pages
        if: steps.configure-pages.outcome == 'failure'
        uses: actions/configure-pages@v6
        with:
          enablement: true
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
